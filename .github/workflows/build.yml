name: Build Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build CSS & Packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Compile Sass
        run: npm run build:css

      - name: Build Compendium Packs
        run: npm run build:packs
